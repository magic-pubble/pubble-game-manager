<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Pubble Game Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      user-select: none;
      -webkit-app-region: drag;
    }
    h1 {
      font-size: 18px;
      font-weight: 900;
      color: #FF1A5E;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    p { font-size: 11px; color: #888; letter-spacing: 1px; }
    .status {
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
      min-height: 18px;
    }
    .progress-wrap {
      width: 240px;
      height: 4px;
      background: #2a2a3a;
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: #FF1A5E;
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s ease;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: #FF1A5E;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Pubble Game Manager</h1>
  <p>Game management tool</p>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Checking for updates...</div>
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron')

    ipcRenderer.on('update-status', (e, { message, progress }) => {
      document.getElementById('status').textContent = message
      if (progress !== undefined) {
        document.getElementById('progress-wrap').style.display = 'block'
        document.getElementById('progress-bar').style.width = progress + '%'
        document.getElementById('spinner').style.display = 'none'
      }
    })
  </script>
</body>
</html>
